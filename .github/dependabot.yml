version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      angular:
        patterns:
          - "@angular/*"
      angular-eslint:
        patterns:
          - "@angular-eslint/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch" # ignore patch versions to reduce noise
      - dependency-name: "@angular/*"
        update-types:
          - "version-update:semver-major" # leave major version updates to devs
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(ci): "
    groups:
      actions:
        patterns:
          - "*"
